services:
  postgres:
    image: postgres:16
    container_name: ironlog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ironlog
      POSTGRES_USER: ironlog
      POSTGRES_PASSWORD: ironlog
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ironlog-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
