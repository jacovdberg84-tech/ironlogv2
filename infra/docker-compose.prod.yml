version: '3.9'

services:
  api:
    image: ghcr.io/your-org/ironlog-api:latest
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis

  web:
    image: ghcr.io/your-org/ironlog-web:latest
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ironlog
      POSTGRES_USER: ironlog
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
