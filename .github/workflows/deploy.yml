name: Deploy Release

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target deployment environment
        required: true
        type: choice
        options:
          - staging
          - production
      ref:
        description: Git ref to deploy (branch, tag, or SHA)
        required: false
        default: main

concurrency:
  group: deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  preflight:
    name: Preflight Build Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build API and web
        run: |
          npm --workspace apps/api run build
          npm --workspace apps/web run build

      - name: Bundle deploy artifact
        run: |
          mkdir -p deploy-artifact
          cp -r apps/api/dist deploy-artifact/api-dist
          cp -r apps/web/dist deploy-artifact/web-dist
          cp package.json package-lock.json deploy-artifact/

      - name: Upload deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-bundle-${{ github.sha }}
          path: deploy-artifact

  deploy:
    name: Deploy to Environment
    runs-on: ubuntu-latest
    needs: preflight
    environment:
      name: ${{ github.event.inputs.environment }}
    steps:
      - name: Download deploy artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-bundle-${{ github.sha }}
          path: deploy-artifact

      - name: Execute deploy hook
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          DEPLOY_WEBHOOK_TOKEN: ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}
        run: |
          if [ -z "$DEPLOY_WEBHOOK_URL" ]; then
            echo "DEPLOY_WEBHOOK_URL is not configured. Set it in repository/environment secrets."
            echo "No deploy action executed."
            exit 0
          fi

          if [[ ! "$DEPLOY_WEBHOOK_URL" =~ ^https?:// ]]; then
            echo "DEPLOY_WEBHOOK_URL must start with http:// or https://"
            echo "Current value appears invalid."
            exit 1
          fi

          webhook_host=$(echo "$DEPLOY_WEBHOOK_URL" | sed -E 's#https?://([^/]+).*#\1#')
          if ! getent hosts "$webhook_host" >/dev/null 2>&1; then
            echo "Could not resolve DEPLOY_WEBHOOK_URL host: $webhook_host"
            echo "This commonly causes curl exit code 6. Check the secret value and DNS reachability."
            exit 1
          fi

          auth_header=()
          if [ -n "$DEPLOY_WEBHOOK_TOKEN" ]; then
            auth_header=(-H "Authorization: Bearer $DEPLOY_WEBHOOK_TOKEN")
          else
            echo "DEPLOY_WEBHOOK_TOKEN is empty; proceeding without Authorization header."
          fi

          curl --retry 3 --retry-all-errors --connect-timeout 10 --max-time 60 -fsS -X POST "$DEPLOY_WEBHOOK_URL" \
            "${auth_header[@]}" \
            -H "Content-Type: application/json" \
            -d '{"repository":"'"${{ github.repository }}"'","sha":"'"${{ github.sha }}"'","ref":"'"${{ github.event.inputs.ref }}"'","environment":"'"${{ github.event.inputs.environment }}"'"}'

      - name: Deployment summary
        run: |
          echo "Deployment workflow completed for environment: ${{ github.event.inputs.environment }}"
          echo "Ref: ${{ github.event.inputs.ref }}"
