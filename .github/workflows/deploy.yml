name: Deploy Release

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target deployment environment
        required: true
        type: choice
        options:
          - staging
          - production
      ref:
        description: Git ref to deploy (branch, tag, or SHA)
        required: false
        default: main

concurrency:
  group: deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  preflight:
    name: Preflight Build Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build API and web
        run: |
          npm --workspace apps/api run build
          npm --workspace apps/web run build

      - name: Bundle deploy artifact
        run: |
          mkdir -p deploy-artifact
          cp -r apps/api/dist deploy-artifact/api-dist
          cp -r apps/web/dist deploy-artifact/web-dist
          cp package.json package-lock.json deploy-artifact/

      - name: Upload deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-bundle-${{ github.sha }}
          path: deploy-artifact

  deploy:
    name: Deploy to Environment
    runs-on: ubuntu-latest
    needs: preflight
    environment:
      name: ${{ github.event.inputs.environment }}
    steps:
      - name: Download deploy artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-bundle-${{ github.sha }}
          path: deploy-artifact

      - name: Execute deploy hook
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          DEPLOY_WEBHOOK_TOKEN: ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}
        run: |
          if [ -z "$DEPLOY_WEBHOOK_URL" ]; then
            echo "DEPLOY_WEBHOOK_URL is not configured. Set it in repository/environment secrets."
            echo "No deploy action executed."
            exit 0
          fi

          curl -fsS -X POST "$DEPLOY_WEBHOOK_URL" \
            -H "Authorization: Bearer $DEPLOY_WEBHOOK_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"repository":"'"${{ github.repository }}"'","sha":"'"${{ github.sha }}"'","ref":"'"${{ github.event.inputs.ref }}"'","environment":"'"${{ github.event.inputs.environment }}"'"}'

      - name: Deployment summary
        run: |
          echo "Deployment workflow completed for environment: ${{ github.event.inputs.environment }}"
          echo "Ref: ${{ github.event.inputs.ref }}"
